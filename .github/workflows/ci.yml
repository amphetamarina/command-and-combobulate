name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # node-pty compiles natively during `bun install`, so a real Node (with
      # python3/make/g++ from the runner image) must be present.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install from the committed lockfile for reproducible builds and to
      # catch lockfile drift.
      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  mod:
    name: Mod (C# build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # The OpenRA engine is fetched and compiled on first build (slow); cache it
      # keyed on the pinned version in mod.config so later runs only rebuild the
      # mod against it.
      - name: Cache OpenRA engine
        uses: actions/cache@v4
        with:
          path: command-and-clanker/engine
          key: openra-engine-${{ runner.os }}-${{ hashFiles('command-and-clanker/mod.config') }}
          restore-keys: |
            openra-engine-${{ runner.os }}-

      - name: Build mod
        working-directory: command-and-clanker
        run: make
