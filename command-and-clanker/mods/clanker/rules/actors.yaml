		Color: FFFFAA

clanker.agent:
	Inherits: HELI
	RenderSprites:
		Image: heli
	# The agent flies (fast, and straight over folder walls) and hovers where it
	# is working. It stays Neutral with HoldFire stance and is never given an
	# attack order, and its ammo never depletes (it never fires), so it neither
	# fights nor flies off to a helipad to rearm; a helicopter's idle behaviour
	# is to hover in place. Only Buildable is dropped (its prerequisites do not
	# exist in this mod, and the bridge spawns the agent directly).
	-Buildable:
	Aircraft:
		Speed: 170
	ClankerLabel:
		Position: Top
		ValidRelationships: Ally, Neutral, Enemy
		Color: FFE066

