clanker.terminal:
	Inherits: FACT
	RenderSprites:
		Image: clankerterminal
	Buildable:
		Queue: Building
		BuildPaletteOrder: 5
		# FACT is normally locked out of the palette by a ~disabled prerequisite;
		# replace it with the always-available baseline (as POWR uses) so the
		# Terminal builds like any other structure from the start.
		Prerequisites: ~techlevel.infonly
		Description: actor-clanker-terminal.description
	Valued:
		Cost: 100
	Tooltip:
		Name: actor-clanker-terminal.name
	ClankerTerminalRef:
	ClankerBuiltTerminal:

