# Iconic role buildings: a touched file's kind reads from its silhouette -- a
# barracks for tests, a power plant for config, a tech center for a manifest, a
# radar dome for docs, a silo for build output. They are spawned as inert
# neutral decorations: Buildable is dropped (no production here) and Power is
# zeroed so they do not perturb a power grid.
clanker.file.test:
	Inherits: TENT
	RenderSprites:
		Image: tent
	-Buildable:
	ClankerLabel:
		Font: TinyBold
		Position: Top
		RequiresSelection: true
		ValidRelationships: Ally, Neutral, Enemy
		Color: FFFFFF

